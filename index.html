<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Name Landing Page</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
      color: white;
      min-height: 100vh;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    .badge {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      padding: 10px 18px;
      border-radius: 999px;
      font-size: 14px;
      margin-bottom: 20px;
      backdrop-filter: blur(8px);
    }

    h1 {
      font-size: clamp(2.5rem, 8vw, 5rem);
      margin-bottom: 16px;
      line-height: 1.1;
    }

    p {
      max-width: 700px;
      font-size: 1.1rem;
      line-height: 1.6;
      color: #e2e8f0;
      margin-bottom: 30px;
    }

    .buttons {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      text-decoration: none;
      padding: 14px 24px;
      border-radius: 12px;
      font-weight: bold;
      transition: 0.3s ease;
      display: inline-block;
    }

    .btn-primary {
      background: #38bdf8;
      color: #0f172a;
    }

    .btn-primary:hover {
      background: #7dd3fc;
      transform: translateY(-2px);
    }

    .btn-secondary {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.1);
      transform: translateY(-2px);
    }

    .footer {
      position: fixed;
      bottom: 20px;
      width: 100%;
      text-align: center;
      font-size: 14px;
      color: #cbd5e1;
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="badge">Welcome to My Website</div>
    <h1>Your Name Here</h1>
    <p>
      This is a modern starter landing page. You can use it for your personal website,
      portfolio, app page, or business homepage.
    </p>
    <div class="buttons">
      <a href="#" class="btn btn-primary">Get Started</a>
      <a href="#" class="btn btn-secondary">Learn More</a>
    </div>
  </section>

  <div class="footer">© 2026 Biswash. All rights reserved.</div>
</body>
</html>
